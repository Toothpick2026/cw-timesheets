<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d0d0d" />
<title>Knockoff — Timesheets</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0d0d; --card:#1a1a1a; --ink:#f0f0f0; --muted:#8a8a8a;
    --line:#2a2a2a; --brand:#FFD000; --brand-dark:#e6bb00;
    --font:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    --heading:'Bebas Neue',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--font);
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; text-align:center;
  }
  .logo{font-family:var(--heading); font-size:56px; letter-spacing:2px; line-height:1; color:var(--brand);}
  .sub{font-family:var(--heading); font-size:15px; letter-spacing:6px; color:var(--muted); text-transform:uppercase; margin-top:6px;}
  .tagline{color:var(--muted); font-size:14px; margin:18px 0 34px;}
  .choices{width:100%; max-width:380px; display:flex; flex-direction:column; gap:14px;}
  .choice{
    display:flex; align-items:center; gap:16px; text-align:left;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:20px 22px; color:var(--ink); text-decoration:none; cursor:pointer;
    transition:border-color .15s, transform .05s, background .15s;
  }
  .choice:hover{border-color:var(--brand); background:#1f1f1f;}
  .choice:active{transform:scale(.99);}
  .choice .emoji{font-size:30px; line-height:1;}
  .choice .label{font-size:18px; font-weight:700;}
  .choice .desc{font-size:13px; color:var(--muted); margin-top:2px;}
  .choice.primary{border-color:var(--brand); background:rgba(255,208,0,.06);}
  .continue{
    width:100%; max-width:380px; margin-bottom:14px;
    background:var(--brand); color:#0d0d0d; border:none; border-radius:14px;
    padding:18px 22px; font-family:var(--font); font-size:17px; font-weight:700; cursor:pointer;
    display:none;
  }
  .continue:hover{background:var(--brand-dark);}
  .foot{margin-top:34px; color:#555; font-size:12px;}
</style>
</head>
<body>
  <div class="logo">KNOCKOFF</div>
  <div class="sub">Timesheets</div>
  <div class="tagline">Clock in, track breaks, get paid right.</div>

  <button class="continue" id="continueBtn"></button>

  <div class="choices">
    <a class="choice primary" href="staff.html">
      <span class="emoji">👷</span>
      <span><span class="label">I'm on the crew</span><div class="desc">Clock in / out and submit your timesheet</div></span>
    </a>
    <a class="choice" href="owner.html">
      <span class="emoji">📋</span>
      <span><span class="label">I'm the owner / manager</span><div class="desc">Review, approve and export timesheets</div></span>
    </a>
  </div>

  <div class="foot">CorpWorks</div>

  <script>
    // If this device has already signed a crew member in, offer a one-tap continue
    // so the daily "open and clock in" habit stays fast.
    try {
      var who = localStorage.getItem('cwts_user');
      if (who) {
        var b = document.getElementById('continueBtn');
        b.textContent = 'Continue as ' + who + ' →';
        b.style.display = 'block';
        b.addEventListener('click', function(){ window.location.href = 'staff.html'; });
      }
    } catch(e){}
  </script>
</body>
</html>
